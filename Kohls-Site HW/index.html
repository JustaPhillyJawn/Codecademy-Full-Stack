 <!DOCTYPE html>

<html>
    <head> 
        <title> Kohl's | Shop Clothes and other Shit</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Asset&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/494a2ec716.js" crossorigin="anonymous"></script>
    </head>
    <body>
         <div class="header">
            <div class="header-left">
                <div class="logo">
                    <button><h1> KOHL'S </h1></button>
                </div>
                <div class="searchbar">
                    <button class="search-icon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" placeholder="What are you looking for, peasant?">
                </div>
                <div class="aibutton">
                    <button><i class="fa-solid fa-circle-question"></i> Ask Kohl's </button>
                </div>
            </div>
            <div class="header-right">
                <div class="signin">
                    <button>
                        <i class="fa-regular fa-user"></i>
                        <text class="btn-text">Sign In</text>
                    </button>
                </div>
                <div class="mylist">
                    <button>
                        <i class="fa-solid fa-heart mylist-icon"></i>
                        <text class="btn-text">My List</text>
                    </button>
                </div>
                <div class="cart">
                    <button>
                        <i class="fa-solid fa-cart-shopping cart-icon"></i> 
                        <text class="btn-text">Cart</text>
                    </button>
                </div>
            </div>
        </div>
        <div class="navbar">
            <div class="navbar-left">
                <div class="category">
                    <button>
                        <i class="fa-solid fa-grip-lines"></i> 
                        Shop by Category
                    </button>
                </div>
                <div class="storefinder">
                    <button> 
                        My Store: [Store Name]
                        <i class="fa-solid fa-angle-down"></i>
                    </button>
                </div>
            </div>
            <div class="navbar-right">
                <div class="credit">
                    <button>
                        <i class="fa-solid fa-credit-card"></i>
                        <text class="btn-text">Go Into Debt</text>
                    </button>
                </div>
                <div class="registry">
                    <button>
                        <i class="fa-solid fa-gift"></i>
                        <text class="btn-text">Offspring Registry</text>
                    </button>
                </div>
                <div class="coupons">
                    <button>
                        <i class="fa-solid fa-dollar-sign"></i>
                        <text class="btn-text">Coupons</text>
                    </button>
                </div>
                <div class="help">
                    <button>
                        <i class="fa-solid fa-circle-question"></i>
                        <text class="btn-text">Help</text>
                    </button>
                </div>
            </div>
        </div>
        <div class="sitelinks"> 
            <div class="catlinks">
                <ul>
                    <a>
                        Sale & Clearance
                    </a>
                    <a>
                        College Essentials
                    </a>
                    <a>
                        Back to School
                    </a>
                    <a>
                        New & Trending
                    </a>
                    <a>
                        Home & Pet
                    </a>
                    <a>
                        Women
                    </a>
                    <a>
                        Men
                    </a>
                    <a>
                        Baby | <i class="fa-solid fa-baby-carriage"></i>
                    </a>
                    <a>
                        Kids & Toys
                    </a>
                    <a>
                        Shoes
                    </a>
                    <a>
                        Beauty | <i class="fa-solid fa-palette"></i>
                    </a>
                    <a>
                        Jewelry
                    </a>
                </ul>
            </div>
        </div>
        <div class="top_ad">
            <button>
                <text>
                    This is probably an image rather than a button
                </text>
            </button>
        </div>
        <div class="shipping_ad">
            <button class="shipping_ad_main">
                <text class="ship_ad_t1">
                    <i class="fa-solid fa-truck-fast"></i>
                    NEED TO WORK ON DYNAMIC SIZING
                </text>
                <text class="ship_ad_t2">
                    Based on window size
                </text>
                <a class=ship_ad_t3>
                    <text>
                        link to a thing
                    </text>
                </a>
            </button>
        </div>
        <div class="product-grid">
            <div class="prod-card">
                <a>
                    <img src="https://images.pexels.com/photos/36647206/pexels-photo-36647206.jpeg" alt="Denim jacket">
                    <h3>Denim Jacket</h3>
                    <p>$49.99</p>
                </a>
            </div>
            <div class="prod-card">
                <a>
                    <img src="https://images.pexels.com/photos/533442/pexels-photo-533442.jpeg" alt="White sneaker">
                    <h3>White Sneakers</h3>
                    <p>$59.99</p>
                </a>
            </div>
            <div class="prod-card">
                <img src="https://images.pexels.com/photos/36133815/pexels-photo-36133815.jpeg" alt="Black hoodie">
                <h3>Black Hoodie</h3>
                <p>$39.99</p>
            </div>
            <div class="prod-card">
                <img src="https://images.pexels.com/photos/4589213/pexels-photo-4589213.jpeg" alt="Summer dress">
                <h3>Summer Dress</h3>
                <p>$44.00</p>
            </div>
            <div class="prod-card">
                <img src="https://images.pexels.com/photos/10973347/pexels-photo-10973347.jpeg" alt="Leather bag">
                <h3>Leather Bag</h3>
                <p>$72.50</p>
            </div>
            <div class="prod-card">
                <img src="https://images.pexels.com/photos/20849736/pexels-photo-20849736.jpeg" alt="Graphic tee">
                <h3>Graphic Tee</h3>
                <p>$22.00</p>
            </div>
        </div>
    </body>
</html>
